        allow 172.16.4.1/32;                     # [Location(a1)]: [Router(l64.a1.example.org)]: LAN3;
        allow 10.20.21.20/32;                    # [Location(b1)]: NET3;
        allow 10.20.21.21/32;                    # [Location(b1)]: NET3;
